<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 AI 挑戰賽 - 音效增強版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --board-color: #e3c18d;
        }
        body {
            background-color: #f3f4f6;
            touch-action: none;
            user-select: none;
        }
        .board-container {
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border-radius: 8px;
            background-color: var(--board-color);
            margin: 0 auto;
        }
        canvas {
            display: block;
            cursor: crosshair;
            max-width: 100%;
            height: auto;
        }
        .mode-active {
            background-color: #3b82f6 !important;
            color: white !important;
        }
        .sound-toggle {
            cursor: pointer;
            transition: transform 0.2s;
        }
        .sound-toggle:active { transform: scale(0.9); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full space-y-4">
        <div class="text-center">
            <div class="flex justify-between items-center mb-2">
                <h1 class="text-3xl font-bold text-gray-800">五子棋 AI</h1>
                <button id="soundToggle" class="sound-toggle bg-white p-2 rounded-full shadow-sm border border-gray-200">
                    <svg id="soundOnIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                    </svg>
                    <svg id="soundOffIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-400 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
                    </svg>
                </button>
            </div>
            
            <div class="flex justify-center mb-4 bg-gray-200 p-1 rounded-lg">
                <button id="p2pMode" class="flex-1 py-1 px-3 rounded-md text-sm font-medium transition mode-active">雙人對戰</button>
                <button id="p2cMode" class="flex-1 py-1 px-3 rounded-md text-sm font-medium transition">挑戰 AI</button>
            </div>

            <div id="statusCard" class="bg-white p-4 rounded-lg shadow-md flex justify-between items-center border-l-8 border-black">
                <div>
                    <p class="text-sm text-gray-500 uppercase tracking-wider">目前回合</p>
                    <p id="turnDisplay" class="text-xl font-bold text-gray-800">黑子 (玩家)</p>
                </div>
                <div id="aiThinking" class="hidden flex items-center text-blue-600 animate-pulse">
                    <span class="text-xs font-bold mr-2">AI 思考中...</span>
                    <div class="w-2 h-2 bg-blue-600 rounded-full"></div>
                </div>
            </div>
        </div>

        <div class="board-container">
            <canvas id="gomokuBoard"></canvas>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button id="undoBtn" class="bg-white hover:bg-gray-100 text-gray-800 font-semibold py-3 px-4 border border-gray-400 rounded shadow transition">
                悔棋
            </button>
            <button id="resetBtn" class="bg-red-500 hover:bg-red-600 text-white font-semibold py-3 px-4 rounded shadow transition">
                重開一局
            </button>
        </div>
    </div>

    <div id="winnerModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white p-8 rounded-xl shadow-2xl text-center max-w-xs w-full mx-4">
            <h2 id="winnerText" class="text-2xl font-bold mb-4">黑子獲勝！</h2>
            <button id="modalResetBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                再玩一局
            </button>
        </div>
    </div>

    <script>
        // --- 音效系統 (Web Audio API) ---
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let soundEnabled = true;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioCtx();
        }

        function playSound(type) {
            if (!soundEnabled || !audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'place') {
                // 落子聲 (清脆的木頭撞擊聲)
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'undo') {
                // 悔棋聲
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.linearRampToValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'win') {
                // 獲勝聲 (三連音)
                [0, 0.15, 0.3].forEach((delay, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.type = 'square';
                    o.frequency.setValueAtTime(440 * Math.pow(1.06, [0, 4, 7][i]), now + delay);
                    g.gain.setValueAtTime(0.1, now + delay);
                    g.gain.exponentialRampToValueAtTime(0.01, now + delay + 0.3);
                    o.start(now + delay);
                    o.stop(now + delay + 0.3);
                });
            }
        }

        // --- 遊戲邏輯 ---
        const canvas = document.getElementById('gomokuBoard');
        const ctx = canvas.getContext('2d');
        const turnDisplay = document.getElementById('turnDisplay');
        const statusCard = document.getElementById('statusCard');
        const aiThinkingUI = document.getElementById('aiThinking');
        const winnerModal = document.getElementById('winnerModal');
        const p2pBtn = document.getElementById('p2pMode');
        const p2cBtn = document.getElementById('p2cMode');
        const soundToggle = document.getElementById('soundToggle');
        const soundOnIcon = document.getElementById('soundOnIcon');
        const soundOffIcon = document.getElementById('soundOffIcon');
        
        const GRID_SIZE = 15;
        let PADDING = 25;
        let CELL_SIZE = 0;
        let board = []; 
        let currentPlayer = 1; 
        let isAiMode = false;
        let isAiThinking = false;
        let history = [];
        let gameOver = false;

        function initGame() {
            const containerWidth = Math.min(window.innerWidth - 40, 450);
            canvas.width = containerWidth;
            canvas.height = containerWidth;
            CELL_SIZE = (canvas.width - PADDING * 2) / (GRID_SIZE - 1);
            resetBoard();
        }

        function resetBoard() {
            board = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
            currentPlayer = 1;
            history = [];
            gameOver = false;
            isAiThinking = false;
            aiThinkingUI.classList.add('hidden');
            updateStatusUI();
            winnerModal.classList.add('hidden');
            draw();
        }

        function updateStatusUI() {
            const isBlack = currentPlayer === 1;
            turnDisplay.innerText = isBlack ? "黑子 (玩家)" : (isAiMode ? "白子 (AI)" : "白子 (玩家)");
            statusCard.style.borderLeftColor = isBlack ? "#000" : (isAiMode ? "#3b82f6" : "#fff");
        }

        function draw() {
            ctx.fillStyle = '#e3c18d';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.strokeStyle = '#5d4037';
            ctx.lineWidth = 1;
            for (let i = 0; i < GRID_SIZE; i++) {
                ctx.moveTo(PADDING + i * CELL_SIZE, PADDING);
                ctx.lineTo(PADDING + i * CELL_SIZE, canvas.height - PADDING);
                ctx.moveTo(PADDING, PADDING + i * CELL_SIZE);
                ctx.lineTo(canvas.width - PADDING, PADDING + i * CELL_SIZE);
            }
            ctx.stroke();

            [3, 7, 11].forEach(r => [3, 7, 11].forEach(c => {
                ctx.beginPath();
                ctx.arc(PADDING + c * CELL_SIZE, PADDING + r * CELL_SIZE, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#5d4037';
                ctx.fill();
            }));

            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (board[r][c] !== 0) drawPiece(r, c, board[r][c]);
                }
            }

            if (history.length > 0) {
                const last = history[history.length - 1];
                ctx.strokeStyle = '#ef4444';
                ctx.lineWidth = 2;
                ctx.strokeRect(PADDING + last.c * CELL_SIZE - 5, PADDING + last.r * CELL_SIZE - 5, 10, 10);
            }
        }

        function drawPiece(r, c, type) {
            const x = PADDING + c * CELL_SIZE;
            const y = PADDING + r * CELL_SIZE;
            const radius = CELL_SIZE * 0.4;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            const grad = ctx.createRadialGradient(x - 3, y - 3, 2, x, y, radius);
            if (type === 1) {
                grad.addColorStop(0, '#666'); grad.addColorStop(1, '#000');
            } else {
                grad.addColorStop(0, '#fff'); grad.addColorStop(1, '#ccc');
            }
            ctx.fillStyle = grad;
            ctx.shadowBlur = 3; ctx.shadowOffsetY = 2; ctx.shadowColor = "rgba(0,0,0,0.3)";
            ctx.fill();
            ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
        }

        function handleAction(x, y) {
            initAudio(); // 確保使用者互動後激活 AudioContext
            if (gameOver || isAiThinking) return;
            const rect = canvas.getBoundingClientRect();
            const c = Math.round((x - rect.left - PADDING) / CELL_SIZE);
            const r = Math.round((y - rect.top - PADDING) / CELL_SIZE);

            if (r >= 0 && r < GRID_SIZE && c >= 0 && c < GRID_SIZE && board[r][c] === 0) {
                makeMove(r, c);
                if (!gameOver && isAiMode && currentPlayer === 2) {
                    startAiTurn();
                }
            }
        }

        function makeMove(r, c) {
            board[r][c] = currentPlayer;
            history.push({r, c, p: currentPlayer});
            playSound('place');
            draw();
            
            if (checkWin(r, c, currentPlayer)) {
                playSound('win');
                endGame(currentPlayer === 1 ? "黑子獲勝！" : (isAiMode ? "AI 獲勝！" : "白子獲勝！"));
                return;
            }

            currentPlayer = currentPlayer === 1 ? 2 : 1;
            updateStatusUI();
        }

        function checkWin(r, c, p) {
            const dirs = [[0,1],[1,0],[1,1],[1,-1]];
            for (let [dr, dc] of dirs) {
                let count = 1;
                for (let s of [1, -1]) {
                    let nr = r + dr*s, nc = c + dc*s;
                    while(nr>=0 && nr<15 && nc>=0 && nc<15 && board[nr][nc] === p) {
                        count++; nr += dr*s; nc += dc*s;
                    }
                }
                if (count >= 5) return true;
            }
            return false;
        }

        function endGame(msg) {
            gameOver = true;
            document.getElementById('winnerText').innerText = msg;
            winnerModal.classList.remove('hidden');
        }

        function startAiTurn() {
            isAiThinking = true;
            aiThinkingUI.classList.remove('hidden');
            setTimeout(() => {
                const bestMove = getBestMove();
                makeMove(bestMove.r, bestMove.c);
                isAiThinking = false;
                aiThinkingUI.classList.add('hidden');
            }, 600);
        }

        function getBestMove() {
            let bestScore = -Infinity;
            let moves = [];
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (board[r][c] === 0) {
                        let score = evaluatePoint(r, c, 2) + evaluatePoint(r, c, 1) * 1.1;
                        score += (7 - Math.abs(r - 7)) + (7 - Math.abs(c - 7));
                        if (score > bestScore) {
                            bestScore = score;
                            moves = [{r, c}];
                        } else if (score === bestScore) {
                            moves.push({r, c});
                        }
                    }
                }
            }
            return moves[Math.floor(Math.random() * moves.length)];
        }

        function evaluatePoint(r, c, p) {
            let totalScore = 0;
            const dirs = [[0,1],[1,0],[1,1],[1,-1]];
            for (let [dr, dc] of dirs) {
                let count = 1; let blocked = 0;
                for (let s of [1, -1]) {
                    let nr = r + dr*s, nc = c + dc*s;
                    while(nr>=0 && nr<15 && nc>=0 && nc<15 && board[nr][nc] === p) {
                        count++; nr += dr*s; nc += dc*s;
                    }
                    if (!(nr>=0 && nr<15 && nc>=0 && nc<15 && board[nr][nc] === 0)) blocked++;
                }
                if (count >= 5) totalScore += 100000;
                else if (count === 4) totalScore += (blocked === 0 ? 10000 : 2500);
                else if (count === 3) totalScore += (blocked === 0 ? 3000 : 500);
                else if (count === 2) totalScore += (blocked === 0 ? 400 : 0);
            }
            return totalScore;
        }

        // --- 事件監聽 ---
        canvas.addEventListener('mousedown', e => handleAction(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            handleAction(e.touches[0].clientX, e.touches[0].clientY);
        });

        soundToggle.onclick = () => {
            soundEnabled = !soundEnabled;
            soundOnIcon.classList.toggle('hidden', !soundEnabled);
            soundOffIcon.classList.toggle('hidden', soundEnabled);
        };

        p2pBtn.onclick = () => {
            isAiMode = false;
            p2pBtn.classList.add('mode-active');
            p2cBtn.classList.remove('mode-active');
            resetBoard();
        };

        p2cBtn.onclick = () => {
            isAiMode = true;
            p2cBtn.classList.add('mode-active');
            p2pBtn.classList.remove('mode-active');
            resetBoard();
        };

        document.getElementById('undoBtn').onclick = () => {
            if (history.length < (isAiMode ? 2 : 1) || gameOver) return;
            playSound('undo');
            const steps = isAiMode ? 2 : 1;
            for(let i=0; i<steps; i++) {
                let last = history.pop();
                board[last.r][last.c] = 0;
            }
            if (!isAiMode) currentPlayer = currentPlayer === 1 ? 2 : 1;
            else currentPlayer = 1;
            updateStatusUI();
            draw();
        };

        document.getElementById('resetBtn').onclick = resetBoard;
        document.getElementById('modalResetBtn').onclick = resetBoard;
        window.onresize = initGame;
        initGame();
    </script>
</body>
</html>
